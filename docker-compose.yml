services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lab1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./:/workspace:ro
      - ./docker/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
